<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин техніки</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
  <div class="logo"></div>
  <nav>
    <a href="#banner">Головна</a>
    <a href="#products">Каталог</a>
    <a href="#footer">Контакти</a>
  </nav>

  <div class="header-actions">
    <button id="themeToggle">🌙</button>
    <div class="cart" id="cartToggle">🛒 <span id="cartCount">0</span></div>
  </div>
</header>

<section class="banner" id="banner">
  <div class="banner-box">
    <h2>Супер Акція!</h2>
    <button id="shopNowBtn">Купити зараз</button>
  </div>
</section>

<section class="search">
  <input type="text" id="searchInput" placeholder="Пошук...">
  <button id="searchBtn">ЗНАЙТИ</button>
</section>

<section class="products" id="products"></section>

<section class="sale">
  <img src="img/lg_tv50s.jpg" alt="Телевізор Samsung 50&quot;">
  <div>
    <h3>Телевізор Samsung 50"</h3>
    <p class="old-price">29900 грн</p>
    <p class="new-price">28999 грн</p>
    <button class="add-sale"
      data-name="Телевізор Samsung 50&quot;"
      data-price="28999"
      data-img="img/lg_tv50s.jpg">
      Купити
    </button>
  </div>
</section>

<!-- Модальне вікно корзини -->
<div id="cartModal" class="cart-modal">
  <div class="cart-content">
    <h3>Ваша корзина</h3>
    <ul id="cartItems"></ul>
    <p id="cartTotal">Сума: 0 грн</p>
    <button id="checkoutBtn">Оформити замовлення</button>
    <button id="closeCart">Закрити</button>
  </div>
</div>

<footer id="footer">
  <p>Контакти: 443435555</p>
  <p>Email: example@mail.com</p> 
  <iframe class="maps" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5049.329668786528!2d25.317612300565347!3d50.744705!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x472599eea56d895b%3A0x7d9fe6c32ce45b7e!2z0JrQvtC80L8n0Y7RgtC10YDQvdC40Lkg0JLRgdC10YHQstGW0YI!5e0!3m2!1sru!2sua!4v1772372858797!5m2!1sru!2sua" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</footer>


<script src="script.js"></script>
</body>
</html>
